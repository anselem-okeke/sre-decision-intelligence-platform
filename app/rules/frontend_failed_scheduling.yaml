id: frontend-failed-scheduling
scenario_id: frontend-availability-breach
name: Frontend FailedScheduling
description: Frontend pod cannot be scheduled onto a Kubernetes node.
priority: 86
severity: critical
domain: platform

conditions:
  - signal: failed_scheduling
    operator: equals
    value: true

decision:
  impact_summary: Frontend pod scheduling failure
  user_impact: Users may be affected because Kubernetes cannot place the frontend workload on a node.
