apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-decision-api
  namespace: sre-decision-intelligence
  labels:
    app.kubernetes.io/name: sre-decision-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sre-decision-intelligence-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sre-decision-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sre-decision-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: sre-decision-intelligence-platform
    spec:
      serviceAccountName: sre-decision-api
      automountServiceAccountToken: true

      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: api
          image: ghcr.io/anselem-okeke/sre-decision-intelligence-platform:1774090
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: sre-decision-api-config
            - secretRef:
                name: sre-decision-api-secret

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health/db
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
