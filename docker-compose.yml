services:
  postgres:
    image: postgres:16
    container_name: sre-decision-postgres
    environment:
      POSTGRES_DB: sre_decision_intelligence
      POSTGRES_USER: sre
      POSTGRES_PASSWORD: sre_password
    ports:
      - "5432:5432"
    volumes:
      - sre_decision_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre -d sre_decision_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sre-decision-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: "SRE Decision Intelligence Platform"
      APP_VERSION: "0.1.0"
      ENVIRONMENT: "docker"

      PROMETHEUS_BASE_URL: "http://host.docker.internal:9090"
      OPENSEARCH_BASE_URL: "http://host.docker.internal:9200"

      WORKLOAD_NAMESPACE: "fintech-workload"
      FRONTEND_SERVICE_NAME: "frontend"
      FRONTEND_APP_LABEL: "frontend"

      DATABASE_URL: "postgresql+psycopg://sre:sre_password@postgres:5432/sre_decision_intelligence"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  sre_decision_postgres_data:
