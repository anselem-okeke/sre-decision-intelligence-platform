services:
  postgres:
    image: postgres:16
    container_name: sre-decision-postgres
    environment:
      POSTGRES_DB: sre_decision_intelligence
      POSTGRES_USER: sre
      POSTGRES_PASSWORD: sre_password
    ports:
      - "5432:5432"
    volumes:
      - sre_decision_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre -d sre_decision_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sre_decision_postgres_data:
